version: '3.8'

services:
  # Database Service (PostgreSQL)
  postgres:
    image: postgres:15-alpine
    container_name: trailverse_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: trailverse
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Cache & Session Store (Redis)
  redis:
    image: redis:7-alpine
    container_name: trailverse_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # Node.js API Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: trailverse_api
    restart: always
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:postgrespassword@postgres:5432/trailverse?schema=public
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=change-this-in-production-long-secure-hash
      - JWT_EXPIRES_IN=7d
      - OPENWEATHER_API_KEY=your_openweather_key
      - MAPBOX_ACCESS_TOKEN=your_mapbox_token
    depends_on:
      - postgres
      - redis

volumes:
  postgres_data:
  redis_data:
